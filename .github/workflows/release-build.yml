name: Generate Release Version

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read app version
        id: version
        run: |
          version_name=$(python - <<'PY'
          import re
          from pathlib import Path

          content = Path("app/build.gradle.kts").read_text()
          match = re.search(r'versionName\s*=\s*"([^"]+)"', content)
          if not match:
              raise SystemExit("Failed to read versionName from app/build.gradle.kts")
          print(match.group(1))
          PY
          )
          tag_name="v${version_name}"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Latest Build Tools
        run: |
          build_tools_list=$(sdkmanager --list | sed -n 's/.*\(build-tools;[0-9.][0-9.a-zA-Z-]*\).*/\1/p')
          stable_build_tools_list=$(echo "$build_tools_list" | grep -v "\-rc")
          latest_stable_version=$(echo "$stable_build_tools_list" | sort -V | tail -n 1)
          latest_version_number=$(echo $latest_stable_version | sed 's/.*;//')
          sdkmanager "$latest_stable_version"
          echo "$ANDROID_SDK_ROOT/build-tools/$latest_version_number" >> $GITHUB_PATH

      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease

      - name: Build Unsigned Release App Bundle
        run: ./gradlew bundleRelease

      - name: Validate Signing Secrets
        env:
          KEYSTORE_B64: ${{ secrets.APP_KEYSTORE }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing_secrets=()
          [[ -n "$KEYSTORE_B64" ]] || missing_secrets+=("APP_KEYSTORE")
          [[ -n "$SIGNING_KEY_ALIAS" ]] || missing_secrets+=("KEY_ALIAS")
          [[ -n "$KEYSTORE_PASSWORD" ]] || missing_secrets+=("KEYSTORE_PASSWORD")
          [[ -n "$SIGNING_PASSWORD" ]] || missing_secrets+=("KEY_PASSWORD")

          if [ ${#missing_secrets[@]} -gt 0 ]; then
            echo "Missing required GitHub secrets: ${missing_secrets[*]}" >&2
            exit 1
          fi

      - name: Generate Signing Key
        env:
          KEYSTORE_B64: ${{ secrets.APP_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          keystore_b64 = os.environ["KEYSTORE_B64"]
          Path("keystore.jks").write_bytes(base64.b64decode(keystore_b64))
          PY
          keytool -list -keystore keystore.jks -storetype JKS -storepass "$KEYSTORE_PASSWORD" >/dev/null
          cp keystore.jks ${{ github.workspace }}/app/build/outputs/bundle/release/keystore.jks
        working-directory: ${{ github.workspace }}/app/build/outputs/apk/release

      - name: Sign Release APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          apksigner sign --ks keystore.jks --ks-type JKS --ks-key-alias "$SIGNING_KEY_ALIAS" --alignment-preserved true --ks-pass env:KEYSTORE_PASSWORD --key-pass env:SIGNING_PASSWORD --out app-release.apk app-release-unsigned.apk
        working-directory: ${{ github.workspace }}/app/build/outputs/apk/release

      - name: Sign Release App Bundle
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -storetype JKS -keystore keystore.jks -keypass $SIGNING_PASSWORD -storepass $KEYSTORE_PASSWORD app-release.aab $SIGNING_KEY_ALIAS
        working-directory: ${{ github.workspace }}/app/build/outputs/bundle/release

      - name: Create Job Summary
        run: |
          unsigned_hash=$(md5 -q ./apk/release/app-release-unsigned.apk)
          signed_hash=$(md5 -q ./apk/release/app-release.apk)
          signed_aab_hash=$(md5 -q ./bundle/release/app-release.aab)
          certificate_hash=$(apksigner verify --print-certs ./apk/release/app-release.apk | grep "SHA-256" | awk -F': ' '{print $2}')
          echo "### Release Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ steps.version.outputs.version_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: \`${{ steps.version.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Unsigned APK md5**: \`${unsigned_hash}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Signed APK md5**: \`${signed_hash}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Signed AAB md5**: \`${signed_aab_hash}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Certificate SHA-256**: \`${certificate_hash}\`" >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ github.workspace }}/app/build/outputs

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.tag_name }}
          path: |
            ${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk
            ${{ github.workspace }}/app/build/outputs/bundle/release/app-release.aab

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              "${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk" \
              "${{ github.workspace }}/app/build/outputs/bundle/release/app-release.aab" \
              --clobber
          else
            gh release create "$TAG_NAME" \
              "${{ github.workspace }}/app/build/outputs/apk/release/app-release.apk" \
              "${{ github.workspace }}/app/build/outputs/bundle/release/app-release.aab" \
              --title "$TAG_NAME" \
              --notes "Release $VERSION_NAME"
          fi
